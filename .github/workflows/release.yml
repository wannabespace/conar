name: Build and release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ToDesktop
        run: pnpm run build:todesktop
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TODESKTOP_ACCESS_TOKEN: ${{ secrets.TODESKTOP_ACCESS_TOKEN }}
          TODESKTOP_EMAIL: ${{ secrets.TODESKTOP_EMAIL }}
          VITE_PUBLIC_API_URL: ${{ secrets.API_URL }}
          VITE_PUBLIC_WEB_URL: ${{ secrets.WEB_URL }}
          VITE_PUBLIC_PROXY_URL: ${{ secrets.PROXY_URL }}
          VITE_PUBLIC_POSTHOG_TOKEN: ${{ secrets.POSTHOG_TOKEN }}
          VITE_PUBLIC_MAIN_URL: ${{ secrets.MAIN_URL }}
