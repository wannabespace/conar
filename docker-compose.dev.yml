# This is a development compose file needed only for the database.
# Run the project using `pnpm run dev` and then run this command if you need to start the databases manually.
# `pnpm run docker:start` to run the databases
# `pnpm run docker:stop` to stop the databases

services:
  postgresql:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=conar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis-server
    image: redis/redis-stack:7.2.0-v19
    restart: always
    ports:
      - '6379:6379'
      - '8001:8001'
    environment:
      - REDIS_ARGS="--requirepass root"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, -a, root, ping]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical:
    container_name: conar-infisical
    image: infisical/infisical:latest
    restart: unless-stopped
    profiles: [infisical]
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    env_file: apps/infisical/.env
    environment:
      NODE_ENV: production
    ports:
      - '8081:8080'
    networks:
      - infisical

  infisical-redis:
    container_name: conar-infisical-redis
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [infisical]
    ports:
      - '6380:6379'
    volumes:
      - infisical_redis_data:/data
    networks:
      - infisical

  infisical-db:
    container_name: conar-infisical-db
    image: postgres:14-alpine
    restart: unless-stopped
    profiles: [infisical]
    environment:
      POSTGRES_PASSWORD: infisical
      POSTGRES_USER: infisical
      POSTGRES_DB: infisical
    ports:
      - '5433:5432'
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=$$POSTGRES_USER --dbname=$$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis-data:
  infisical_pg_data:
  infisical_redis_data:

networks:
  infisical:
